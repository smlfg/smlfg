name: Update HAI profile pulse

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-pulse.yml
      - scripts/generate_pulse.py
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate public profile pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: smlfg
        run: python scripts/generate_pulse.py

      - name: Commit updated SVGs
        run: |
          if git diff --quiet -- assets; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          git commit -m "chore: update public HAI pulse [skip ci]"
          git push
