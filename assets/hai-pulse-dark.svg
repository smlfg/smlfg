  <text x="928" y="64" text-anchor="end" class="label">UPDATED 2026-07-19</text>
  <line x1="72" y1="181" x2="928" y2="181" stroke="#30363d"/>
  <text x="72" y="225" class="number">—</text>
        <text x="72" y="254" class="label">PUBLIC REPOSITORIES</text>
<text x="350" y="225" class="number">—</text>
