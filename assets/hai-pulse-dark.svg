<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400" role="img" aria-labelledby="title description">
  <title id="title">Samuel Fleig — HAI public build pulse</title>
  <desc id="description">Public GitHub metrics and the Human-Agent Interface control loop.</desc>
  <style>
    .eyebrow { fill: #3fb950; font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 1.8px; }
    .title { fill: #f0f6fc; font: 700 34px ui-sans-serif, system-ui, sans-serif; letter-spacing: -0.8px; }
    .subtitle { fill: #8b949e; font: 400 16px ui-sans-serif, system-ui, sans-serif; }
    .number { fill: #f0f6fc; font: 700 38px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .label { fill: #8b949e; font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.9px; }
    .stage { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .stageText { fill: #f0f6fc; font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.6px; }
    .connector { stroke: #1f6f3a; stroke-width: 2; }
  </style>
  <rect width="1000" height="400" rx="14" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="999" height="399" rx="13.5" fill="none" stroke="#30363d"/>
